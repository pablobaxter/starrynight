# Project type
type = "androidLibrary"

enableMetro = true
enableWire = true

# Libraries to be used (maven address or version catalog name)
[dependencies]

implementation = [
    { type = "library", name = "kotlinx.serialization" },
    { type = "library", name = "kotlinx.serialization.json" },
    { type = "library", name = "okhttp" },
    { type = "library", name = "androidx.core" },
    { type = "library", name = "androidx.datastore" },
    { type = "library", name = "androidx.datastore.tink" },
    { type = "library", name = "tink.android" },
]

api = [
    { type = "library", name = "retrofit" },
    { type = "library", name = "androidx.datastore.preferences.core.android" },
    { type = "library", name = "androidx.datastore.core" },
    { type = "library", name = "okio" },
    { type = "library", name = "kotlinx.coroutines.core" },

    { type = "project", name = ":atproto:api" },
    { type = "project", name = ":auth:api" },
    { type = "project", name = ":utils:core:api" },
]
