[versions]
androidx-core-version="1.18.0"
activity-compose-version = "1.13.0"
kotlin-version = "2.3.20"
kotlinx-serialization = "1.10.0"
compose-bom-version = "2026.03.01"
google-material="1.13.0"

[libraries]
androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activity-compose-version" }
androidx-compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "compose-bom-version" }
androidx-core = { group = "androidx.core", name = "core-ktx", version.ref = "androidx-core-version" }
androidx-compose-material3 = { group = "androidx.compose.material3", name = "material3" }
google-material = { group = "com.google.android.material", name = "material", version.ref = "google-material" }
kotlinx-serialization = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-core", version.ref = "kotlinx-serialization" }
metrox-android = { group = "dev.zacsweers.metro", name = "metrox-android", version.ref = "metro-version" }

[bundles]

[plugins]
android-application = { id = "com.android.application", version.ref = "agp-version" }
android-library = { id = "com.android.library", version.ref = "agp-version" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin-version" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin-version" }
kotlinx-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version = "2.3.20" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp-version" }
android-cache-fix = { id = "org.gradle.android.cache-fix", version = "3.0.3" }
