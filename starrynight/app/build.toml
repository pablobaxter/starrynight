# Project type
type = "androidApplication"

applicationId = "com.frybits.starrynight.android"
namespace = "com.frybits.starrynight.android.app"

targetSdk = 37

enableMetro = true

[buildConfigs]

# Libraries to be used (maven address or version catalog name)
[dependencies]

# Used to add libraries into the "implementation" configuration
implementation = [
    { type = "library", name = "metrox.android" },
    { type = "library", name = "metrox.viewmodel" },
    { type = "library", name = "tink.android" },

    { type = "library", name = "androidx.datastore.preferences.core" },
    { type = "library", name = "androidx.lifecycle.viewmodel" },
    { type = "library", name = "kotlinx.coroutines.core" },
    { type = "library", name = "kotlinx.serialization.json" },
    { type = "library", name = "okhttp" },
    { type = "library", name = "retrofit" },

    # Api modules
    { type = "project", name = ":atproto:api" },
    { type = "project", name = ":auth:api" },
    { type = "project", name = ":network:api" },
    { type = "project", name = ":utils:core:api" },

    # Data modules
    { type = "project", name = ":atproto:data" },

    # Main impl module
    { type = "project", name = ":starrynight:impl" },

    # Impl modules
    { type = "project", name = ":atproto:impl" },
    { type = "project", name = ":auth:impl" },
    { type = "project", name = ":home:impl" },
    { type = "project", name = ":login:impl" },
    { type = "project", name = ":network:impl" },
    { type = "project", name = ":persistence:impl" },
    { type = "project", name = ":utils:core:impl" },
]
